<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1e3a8a" />
    <title>MOCK ANALYSIS SS-MAP | HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @media print {
        @page { 
          size: A4 portrait; 
          margin: 0; 
        }
        
        /* Hide everything by default */
        body > * {
          display: none !important;
        }

        /* Show only the printing container and its ancestors */
        #root, 
        #root > div, 
        #root > div > div, 
        .report-card-container.is-printing {
          display: block !important;
          visibility: visible !important;
          position: relative !important;
          width: 100% !important;
          height: auto !important;
          background: white !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Hide all other siblings of the printing container */
        .report-card-container:not(.is-printing) {
          display: none !important;
        }

        /* Hide UI elements */
        .no-print, .no-print * {
          display: none !important;
        }

        /* Reset scaling for print */
        .is-printing .print-content {
          transform: none !important;
          width: 210mm !important;
          height: 297mm !important;
          margin: 0 auto !important;
          box-shadow: none !important;
          border: none !important;
        }

        /* Ensure background colors print */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
      }
      
      /* CAPI Optimized Scroll System */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #1e3a8a; }
      
      body {
        -webkit-tap-highlight-color: transparent;
        touch-action: pan-x pan-y pinch-zoom;
        overflow-x: auto;
      }

      .custom-scrollbar-horizontal {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .origin-top {
        transform-origin: top center;
      }
    </style>
</head>
  <body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
